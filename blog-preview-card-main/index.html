<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <article class="container">
    <div class="card">
      <div class="up">
      <img src="\blog-preview-card-main\assets\images\illustration-article.svg" alt="image of the illustratin illustration-article">
      <span class="tag">Learning</span>
       <p class="date">Published 21 Dec 2023</p>
       <h2> HTML & CSS foundations</h2>
       <p class="description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
       </div>

      <footer>
        <img src="\blog-preview-card-main\assets\images\image-avatar.webp" alt="picture of greg hooper">
        <p class="name">Greg Hooper</p>
        </footer>
     </div>
  </article>
</body>
</html>
